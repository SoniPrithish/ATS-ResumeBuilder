name: Build Resume PDF

on:
  push:
    branches: [main]
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt update
          sudo apt install -y texlive-full

      - name: Compile resume
        run: |
          pdflatex Resume_PrithishSoni.tex
          pdflatex Resume_PrithishSoni.tex

      - name: Commit generated PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Resume_PrithishSoni.pdf
          git commit -m "Update Resume_PrithishSoni.pdf" || echo "No changes"
          git push