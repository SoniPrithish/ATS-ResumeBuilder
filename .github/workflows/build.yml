name: Build Resume PDF

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install minimal LaTeX
        run: |
          sudo apt update
          sudo apt install -y \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-fonts-extra

      - name: Compile resume
        run: |
          pdflatex Resume_PrithishSoni.tex
          pdflatex Resume_PrithishSoni.tex

      - name: Rename PDF
        run: mv Resume_PrithishSoni.pdf resume.pdf

      - name: Commit PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add resume.pdf
          git commit -m "Update resume PDF" || echo "No changes"
          git push