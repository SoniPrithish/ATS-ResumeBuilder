version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: techresume-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: techresume
      POSTGRES_PASSWORD: techresume_dev
      POSTGRES_DB: techresume
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U techresume" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
